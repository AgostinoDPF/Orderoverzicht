# Deploys main (production) to / and test branch to /test/
name: Deploy static content to Pages

on:
  push:
    branches: ["main", "test"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (productie)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Haal test/index.html op via git show
        run: |
          git fetch origin test
          mkdir -p test
          if git show origin/test:index.html > test/index.html 2>/dev/null; then
            echo "test/index.html succesvol opgehaald ($(wc -c < test/index.html) bytes)"
          else
            echo "Geen index.html gevonden op test branch"
            rm -rf test
          fi

      - name: Voeg TEST OMGEVING banner toe
        run: |
          if [ -f test/index.html ]; then
            python3 -c "
          import re
          f = 'test/index.html'
          html = open(f, encoding='utf-8').read()
          b = '<div id=\"test-banner\" style=\"position:fixed;top:0;left:0;right:0;z-index:99999;background:#F59E0B;color:#fff;text-align:center;padding:9px 16px;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.15);\">TEST OMGEVING — wijzigingen hier zijn NIET live in productie</div>'
          html = re.sub(r'(<body[^>]*>)', lambda m: m.group(0) + b, html, 1)
          open(f, 'w', encoding='utf-8').write(html)
          print('TEST banner toegevoegd aan', f)
          "
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
