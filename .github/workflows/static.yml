# Deploys main (production) to / and test branch to /test/
name: Deploy static content to Pages

on:
  push:
    branches: ["main", "test"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout test branch (tijdelijk)
        uses: actions/checkout@v4
        with:
          ref: test
          path: _test_branch
        continue-on-error: true

      - name: Kopieer test index.html naar test/ submap
        run: |
          if [ -f _test_branch/index.html ]; then
            mkdir -p test
            cp _test_branch/index.html test/index.html
            echo "Test index.html gekopieerd"
          fi
          rm -rf _test_branch

      - name: Inject TEST OMGEVING banner (via Python)
        run: |
          if [ -f test/index.html ]; then
            python3 - <<'PYEOF'
          with open('test/index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          banner = (
              '<div id="test-env-banner" style="position:fixed;top:0;left:0;right:0;'
              'z-index:99999;background:#F59E0B;color:#fff;text-align:center;'
              'padding:9px 16px;font-family:system-ui,sans-serif;font-size:13px;'
              'font-weight:600;letter-spacing:-.01em;'
              'box-shadow:0 2px 8px rgba(0,0,0,.15);">'
              '&#9888; TEST OMGEVING &mdash; wijzigingen hier zijn NIET live in productie'
              '</div>'
          )
          import re
          html = re.sub(r'(<body[^>]*>)', r'\1' + banner, html, count=1)
          with open('test/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print('TEST banner succesvol geïnjecteerd')
          PYEOF
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
