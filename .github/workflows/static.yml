# Deploys main (production) to / and test branch to /test/
name: Deploy static content to Pages

on:
  push:
    branches: ["main", "test"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: build

      - name: Checkout test branch into build/test
        uses: actions/checkout@v4
        with:
          ref: test
          path: build/test
        continue-on-error: true

      - name: Inject TEST OMGEVING banner into test build
        run: |
          if [ -f build/test/index.html ]; then
            BANNER='<div id="test-env-banner" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#F59E0B;color:#fff;text-align:center;padding:9px 16px;font-family:system-ui,sans-serif;font-size:13px;font-weight:600;letter-spacing:-.01em;box-shadow:0 2px 8px rgba(0,0,0,.15);">&#9888; TEST OMGEVING &mdash; wijzigingen hier zijn NIET live in productie</div>'
            sed -i "s|<body\([^>]*\)>|<body\1>${BANNER}|" build/test/index.html
            echo "TEST banner injected into build/test/index.html"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
